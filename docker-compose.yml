services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Default: the `postgres` service below (a container on this machine),
      # not an external/cloud DB. No internet access is required to run this.
      DATABASE_URL: ${DATABASE_URL:-postgres://taskflow:taskflow@postgres:5432/taskflow?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Local Postgres container — the default DB for this stack. Nothing here
  # talks to Neon or any other external service; swap DATABASE_URL yourself
  # if you want to point at a cloud DB instead.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
