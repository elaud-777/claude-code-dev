namespace:
  create: true
  name: taskflow

backend:
  replicaCount: 2
  image:
    # Default assumes a locally-built image loaded straight into the
    # cluster (`docker build -t taskflow-backend:local ./backend` +
    # `kind load docker-image` / `minikube image load`) — no registry
    # required. For a remote cluster, override with your own registry,
    # e.g. --set backend.image.repository=ghcr.io/<you>/taskflow-backend
    repository: taskflow-backend
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

  # CORS_ORIGINS is non-sensitive config -> ConfigMap.
  corsOrigins: "https://taskflow.example.com"

  # DATABASE_URL / JWT_SECRET are sensitive -> Secret.
  # NOTE: with replicaCount > 1, databaseUrl MUST point at Postgres.
  # SQLite is single-writer and only safe for a single, non-replicated pod.
  # Default below assumes k8s/postgres.yaml's in-cluster Postgres (a
  # container running in this cluster, not an external/cloud DB); swap it
  # for a managed Postgres (Neon, etc.) connection string only if you want one.
  secret:
    # If existingSecret is set, the chart uses that Secret (must contain
    # DATABASE_URL and JWT_SECRET keys) instead of creating one from the
    # values below. Prefer this in real deployments so secrets never sit in
    # `helm history`/values files.
    existingSecret: ""
    # Leave blank to auto-derive from the postgres.* values below (pointing
    # at the in-cluster Postgres this chart deploys). Set explicitly to
    # override, e.g. to point at a managed Postgres (Neon, etc.) instead.
    databaseUrl: ""
    jwtSecret: "replace-with-a-long-random-value"

# In-cluster Postgres — a container running in this cluster, not an
# external/cloud DB. Set enabled: false if you're pointing
# backend.secret.databaseUrl (or existingSecret) at a managed Postgres instead.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  storage: 1Gi
  auth:
    user: taskflow
    password: taskflow
    database: taskflow

frontend:
  replicaCount: 2
  image:
    # Same local-image assumption as backend.image above.
    repository: taskflow-frontend
    tag: local
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources:
    requests:
      cpu: 25m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

  # Injected as window.API_BASE via a ConfigMap-mounted config.js.
  apiBase: "https://api.taskflow.example.com"

ingress:
  enabled: true
  className: nginx
  annotations: {}
  frontendHost: taskflow.example.com
  apiHost: api.taskflow.example.com
  tls:
    enabled: false
    secretName: taskflow-tls
