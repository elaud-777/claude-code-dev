apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ include "taskflow.namespace" . }}
  labels:
    {{- include "taskflow.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-backend
spec:
  selector:
    app: {{ .Release.Name }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
  type: ClusterIP
