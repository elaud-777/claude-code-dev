apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  namespace: {{ include "taskflow.namespace" . }}
  labels:
    {{- include "taskflow.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-frontend
spec:
  selector:
    app: {{ .Release.Name }}-frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
  type: ClusterIP
