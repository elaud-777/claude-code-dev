{{- if not .Values.backend.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "taskflow.backendSecretName" . }}
  namespace: {{ include "taskflow.namespace" . }}
  labels:
    {{- include "taskflow.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-backend
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.backend.secret.databaseUrl | quote }}
  JWT_SECRET: {{ .Values.backend.secret.jwtSecret | quote }}
{{- end }}
