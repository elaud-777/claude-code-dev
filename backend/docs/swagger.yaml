basePath: /
definitions:
  internal_handlers.authResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/internal_handlers.userOut'
    type: object
  internal_handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_handlers.memberOut:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_owner:
        type: boolean
    type: object
  internal_handlers.messageOut:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      team_id:
        type: integer
      user_email:
        type: string
      user_id:
        type: integer
    type: object
  internal_handlers.signupRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_handlers.taskOut:
    properties:
      assignee_id:
        type: integer
      created_at:
        type: string
      creator_id:
        type: integer
      id:
        type: integer
      status:
        type: string
      team_id:
        type: integer
      title:
        type: string
    type: object
  internal_handlers.teamInfoOut:
    properties:
      id:
        type: integer
      invite_code:
        type: string
      member_count:
        type: integer
      name:
        type: string
    type: object
  internal_handlers.teamOut:
    properties:
      created_at:
        type: string
      id:
        type: integer
      invite_code:
        type: string
      name:
        type: string
      owner_id:
        type: integer
    type: object
  internal_handlers.userOut:
    properties:
      email:
        type: string
      id:
        type: integer
      team_id:
        type: integer
    type: object
info:
  contact: {}
  description: TaskFlow MVP backend (Go implementation).
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.authResponse'
      summary: 로그인
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 로그아웃 (stateless)
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.userOut'
      security:
      - BearerAuth: []
      summary: 현재 사용자 조회
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      parameters:
      - description: signup payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.signupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.authResponse'
      summary: 회원가입
      tags:
      - auth
  /messages/{messageId}:
    delete:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 메시지 삭제 (본인만)
      tags:
      - messages
  /tasks/{taskId}:
    delete:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 태스크 삭제 (creator 또는 owner만)
      tags:
      - tasks
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.taskOut'
      security:
      - BearerAuth: []
      summary: 태스크 상세 조회
      tags:
      - tasks
    put:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.taskOut'
      security:
      - BearerAuth: []
      summary: 태스크 제목/담당자 수정
      tags:
      - tasks
  /tasks/{taskId}/status:
    patch:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.taskOut'
      security:
      - BearerAuth: []
      summary: 태스크 상태 변경 (드래그)
      tags:
      - tasks
  /teams:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.teamOut'
      security:
      - BearerAuth: []
      summary: 팀 생성
      tags:
      - teams
  /teams/{teamId}:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.teamInfoOut'
      security:
      - BearerAuth: []
      summary: 팀 정보 조회
      tags:
      - teams
  /teams/{teamId}/leave:
    delete:
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 팀 나가기
      tags:
      - teams
  /teams/{teamId}/members:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.memberOut'
            type: array
      security:
      - BearerAuth: []
      summary: 팀 멤버 목록
      tags:
      - teams
  /teams/{teamId}/messages:
    get:
      parameters:
      - description: RFC3339 timestamp
        in: query
        name: since
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.messageOut'
            type: array
      security:
      - BearerAuth: []
      summary: 팀 채팅 메시지 조회 (폴링)
      tags:
      - messages
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.messageOut'
      security:
      - BearerAuth: []
      summary: 팀 채팅 메시지 전송
      tags:
      - messages
  /teams/{teamId}/tasks:
    get:
      parameters:
      - description: all|me|unassigned
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.taskOut'
            type: array
      security:
      - BearerAuth: []
      summary: 칸반 태스크 목록 조회
      tags:
      - tasks
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.taskOut'
      security:
      - BearerAuth: []
      summary: 태스크 생성
      tags:
      - tasks
  /teams/join:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.teamInfoOut'
      security:
      - BearerAuth: []
      summary: 초대코드로 팀 합류
      tags:
      - teams
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
