# Template only — do NOT commit a filled-in copy of this file.
# Copy to backend-secret.yaml (gitignored), fill in real values, then:
#   kubectl apply -f k8s/backend-secret.yaml
#
# Or skip the file entirely and create it imperatively:
#   kubectl create secret generic taskflow-backend-secret -n taskflow \
#     --from-literal=DATABASE_URL='postgres://taskflow:taskflow@taskflow-postgres:5432/taskflow?sslmode=disable' \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)"
#
# The DATABASE_URL below points at k8s/postgres.yaml's in-cluster Postgres —
# a container running in this cluster, not an external/cloud DB. Swap it for
# a managed Postgres (Neon, etc.) connection string only if you want one.
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-backend-secret
  namespace: taskflow
type: Opaque
stringData:
  DATABASE_URL: "postgres://taskflow:taskflow@taskflow-postgres:5432/taskflow?sslmode=disable"
  JWT_SECRET: "replace-with-a-long-random-value"
