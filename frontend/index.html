<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow</title>
<link rel="stylesheet" href="tailwind.css" />
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 로그인 / 회원가입 -->
<div id="view-auth" class="hidden min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-lg shadow p-6">
    <div class="text-center mb-6">
      <span class="inline-block bg-teal-700 text-white font-bold px-4 py-2 rounded">TaskFlow</span>
    </div>
    <h1 id="auth-title" class="text-xl font-bold text-center mb-4">로그인</h1>

    <form id="auth-form" class="space-y-3">
      <div>
        <input id="auth-email" type="email" placeholder="이메일 입력" required
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-600" />
        <p id="auth-email-error" class="text-red-600 text-sm mt-1 hidden"></p>
      </div>
      <div>
        <input id="auth-password" type="password" placeholder="비밀번호 (8자 이상)" required
          class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-600" />
        <p id="auth-password-error" class="text-red-600 text-sm mt-1 hidden"></p>
      </div>
      <div id="auth-general-error" class="text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2 text-sm hidden"></div>
      <button id="auth-submit" type="submit"
        class="w-full bg-teal-700 hover:bg-teal-800 text-white rounded py-2 font-medium">로그인</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      <span id="auth-toggle-text">계정이 없으신가요?</span>
      <a href="#" id="auth-toggle-link" class="text-teal-700 underline">회원가입</a>
    </p>
  </div>
</div>

<!-- 팀 선택 -->
<div id="view-team-select" class="hidden min-h-screen px-4 py-10">
  <div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-4">
      <span class="font-bold text-teal-700">TaskFlow</span>
      <div class="text-sm text-gray-500">
        <span id="team-select-email"></span> | <a href="#" id="team-select-logout" class="underline">로그아웃</a>
      </div>
    </div>
    <div class="bg-blue-50 border border-blue-200 text-blue-800 rounded px-4 py-3 mb-6 text-sm">
      아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
    </div>
    <div class="grid sm:grid-cols-2 gap-4">
      <div class="border rounded-lg p-4">
        <h2 class="font-bold mb-3">+ 새 팀 만들기</h2>
        <input id="team-name-input" maxlength="30" placeholder="팀 이름 (1-30자)"
          class="w-full border rounded px-3 py-2 mb-2" />
        <p id="team-create-error" class="text-red-600 text-sm mb-2 hidden"></p>
        <button id="team-create-btn" class="w-full bg-teal-700 text-white rounded py-2">만들기</button>
      </div>
      <div class="border rounded-lg p-4">
        <h2 class="font-bold mb-3">초대코드로 합류</h2>
        <input id="invite-code-input" placeholder="ABCD-1234" maxlength="9"
          class="w-full border rounded px-3 py-2 mb-2 uppercase" />
        <p id="team-join-error" class="text-red-600 text-sm mb-2 hidden"></p>
        <button id="team-join-btn" class="w-full bg-green-600 text-white rounded py-2">합류</button>
      </div>
    </div>
  </div>
</div>

<!-- 메인 앱 (칸반 + 채팅 + 멤버) -->
<div id="view-app" class="hidden min-h-screen">
  <header class="bg-white border-b px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <button id="hamburger-btn" class="md:hidden text-xl">&#9776;</button>
      <span class="font-bold text-teal-700">TaskFlow</span>
      <span id="app-team-name" class="hidden sm:inline text-gray-500 text-sm"></span>
    </div>
    <nav class="hidden md:flex gap-2">
      <button data-tab="kanban" class="tab-btn px-3 py-1 rounded bg-teal-700 text-white">칸반</button>
      <button data-tab="chat" class="tab-btn px-3 py-1 rounded">채팅</button>
      <button data-tab="members" class="tab-btn px-3 py-1 rounded">멤버</button>
    </nav>
    <div class="hidden md:block text-sm text-gray-500">
      <span id="app-email"></span> | <a href="#" id="app-logout" class="underline">로그아웃</a>
    </div>
  </header>

  <!-- 모바일 햄버거 메뉴 -->
  <div id="mobile-menu" class="hidden md:hidden bg-white border-b px-4 py-3 space-y-2">
    <button data-tab="kanban" class="tab-btn-mobile block w-full text-left px-3 py-2 rounded bg-gray-100">📋 칸반</button>
    <button data-tab="chat" class="tab-btn-mobile block w-full text-left px-3 py-2 rounded">💬 채팅</button>
    <button data-tab="members" class="tab-btn-mobile block w-full text-left px-3 py-2 rounded">👥 팀 멤버</button>
    <a href="#" id="mobile-logout" class="block px-3 py-2 rounded text-red-600">🚪 로그아웃</a>
  </div>

  <!-- 칸반 탭 -->
  <section id="tab-kanban" class="tab-panel p-4">
    <div class="flex gap-2 mb-4">
      <button data-filter="all" class="filter-btn px-3 py-1 rounded bg-gray-800 text-white text-sm">전체</button>
      <button data-filter="me" class="filter-btn px-3 py-1 rounded bg-gray-100 text-sm">@me</button>
      <button data-filter="unassigned" class="filter-btn px-3 py-1 rounded bg-gray-100 text-sm">미할당</button>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 overflow-x-auto">
      <div class="kanban-column bg-yellow-50 rounded-lg p-3" data-status="TODO">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-bold">TODO · <span class="count">0</span></h3>
          <button class="add-task-btn text-xl leading-none">+</button>
        </div>
        <div class="task-list space-y-2 min-h-[80px]"></div>
      </div>
      <div class="kanban-column bg-blue-50 rounded-lg p-3" data-status="DOING">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-bold">DOING · <span class="count">0</span></h3>
          <button class="add-task-btn text-xl leading-none">+</button>
        </div>
        <div class="task-list space-y-2 min-h-[80px]"></div>
      </div>
      <div class="kanban-column bg-green-50 rounded-lg p-3" data-status="DONE">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-bold">DONE · <span class="count">0</span></h3>
          <button class="add-task-btn text-xl leading-none">+</button>
        </div>
        <div class="task-list space-y-2 min-h-[80px]"></div>
      </div>
    </div>
  </section>

  <!-- 채팅 탭 -->
  <section id="tab-chat" class="tab-panel hidden p-4">
    <div class="max-w-2xl mx-auto bg-white border rounded-lg flex flex-col h-[70vh]">
      <div class="border-b px-4 py-2 flex justify-between items-center text-sm text-gray-500">
        <span>채팅</span>
        <span id="chat-status">● 5초마다 새로고침</span>
      </div>
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
      <div class="border-t p-3">
        <div class="flex gap-2">
          <input id="chat-input" maxlength="1000" placeholder="메시지 입력 (1000자 이내)…"
            class="flex-1 border rounded px-3 py-2" />
          <button id="chat-send-btn" class="bg-teal-700 text-white px-4 rounded">전송</button>
        </div>
        <p id="chat-counter" class="text-xs text-gray-400 mt-1">0 / 1000</p>
      </div>
    </div>
  </section>

  <!-- 멤버 탭 -->
  <section id="tab-members" class="tab-panel hidden p-4">
    <div class="max-w-md mx-auto bg-white border rounded-lg p-4">
      <h3 class="font-bold mb-3">팀 멤버 (<span id="member-count">0</span>)</h3>
      <div id="member-list" class="space-y-2"></div>
    </div>
  </section>
</div>

<!-- 태스크 상세/수정 모달 -->
<div id="task-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg p-5 w-full max-w-md">
    <div class="flex justify-between items-start mb-4">
      <h3 class="font-bold"><span id="modal-task-id"></span> <span id="modal-task-title-display"></span></h3>
      <button id="modal-close-btn" class="text-xl leading-none">&times;</button>
    </div>
    <label class="block text-sm text-gray-500 mb-1">제목</label>
    <input id="modal-title-input" class="w-full border rounded px-3 py-2 mb-3" />

    <label class="block text-sm text-gray-500 mb-1">상태</label>
    <div class="flex gap-2 mb-3">
      <button data-status="TODO" class="modal-status-btn flex-1 border rounded py-1">TODO</button>
      <button data-status="DOING" class="modal-status-btn flex-1 border rounded py-1">DOING</button>
      <button data-status="DONE" class="modal-status-btn flex-1 border rounded py-1">DONE</button>
    </div>

    <label class="block text-sm text-gray-500 mb-1">담당자</label>
    <select id="modal-assignee-select" class="w-full border rounded px-3 py-2 mb-4">
      <option value="">미할당</option>
    </select>

    <div class="flex gap-2">
      <button id="modal-save-btn" class="flex-1 bg-teal-700 text-white rounded py-2">저장</button>
      <button id="modal-delete-btn" class="bg-red-600 text-white rounded py-2 px-4">🗑 삭제</button>
    </div>
    <p id="modal-error" class="text-red-600 text-sm mt-2 hidden"></p>
  </div>
</div>

<!-- 삭제 확인 다이얼로그 -->
<div id="confirm-dialog" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg p-5 w-full max-w-sm text-center">
    <p class="mb-4" id="confirm-message">삭제하시겠습니까?</p>
    <div class="flex gap-2">
      <button id="confirm-cancel-btn" class="flex-1 border rounded py-2">취소</button>
      <button id="confirm-ok-btn" class="flex-1 bg-red-600 text-white rounded py-2">삭제</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-4 py-2 rounded shadow"></div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
